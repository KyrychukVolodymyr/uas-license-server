services:
  - type: web
    name: uas-license-server
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ENV
        value: production
      - key: ADMIN_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
